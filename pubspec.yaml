name: heart
description: "A new Flutter project."

publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.2
  lottie: ^2.7.0
  get: ^4.6.6
  intl: ^0.19.0
  smooth_page_indicator: ^1.1.0
  iconsax: ^0.0.8
  eva_icons_flutter: ^3.1.0
  video_player: ^2.8.2
  iconly: ^1.0.1
  iconify_flutter: ^0.0.5
  parsed_readmore: ^0.0.8
  provider: ^6.1.1
  percent_indicator: ^4.2.3
  auto_size_text: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/login/
    - assets/animations/logo/
    - assets/animations/signup/
    - assets/animations/
    - assets/logo/
    - assets/on_boarding_animations/

  
  fonts:
    - family: RobotoSlab_Light
      fonts:
        - asset: assets/fonts/Roboto_Slab/RobotoSlab-Light.ttf
    - family: RobotoSlab_Regular
      fonts:
        - asset: assets/fonts/Roboto_Slab/RobotoSlab-Regular.ttf
    - family: RobotoSlab_Medium
      fonts:
        - asset: assets/fonts/Roboto_Slab/RobotoSlab-Medium.ttf
    - family: TiltWarp
      fonts:
        - asset: assets/fonts/TiltWarp/TiltWarp-Regular.ttf
    - family: Wide_Latin
      fonts:
        - asset: assets/fonts/Wide_Latin/Wide-Latin-Regular.ttf
    - family: Poppins_SemiBold
      fonts:
        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
    - family: Poppins_Regular
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
